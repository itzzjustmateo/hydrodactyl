                  example: 2
                daemon_type:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
                backup_disk:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
                bucket:
                  type: number
                  description: 'Must match an existing stored value.'
                  example: 4326.41688
                  nullable: true
